apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    app: cloudflared
spec:
  replicas: 2 # 터널 커넥터 이중화
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          # 이미지 고정(다른 워크로드와 같은 GitOps 원칙) — 공개 진입로가 재스케줄 때
          # 미검증 버전으로 조용히 바뀌는 것을 막는다. 업그레이드 = 태그 bump 커밋.
          image: cloudflare/cloudflared:2026.6.1
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            # 터널 토큰은 git 밖 Secret. 생성: README.md 참고.
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
