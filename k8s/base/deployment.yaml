apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizdeck
  labels:
    app: quizdeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quizdeck
  template:
    metadata:
      labels:
        app: quizdeck
    spec:
      containers:
        - name: quizdeck
          image: ghcr.io/young1ll/quizdeck # 태그는 kustomization.yaml(CI가 bump)에서 지정
          ports:
            - containerPort: 3000 # node standalone 서버(이미지가 PORT=3000)
          env:
            # 절대 URL·trustedOrigins(CSRF) 기준. 공개 도메인이라 시크릿 아님. (이슈 #6)
            - name: BETTER_AUTH_URL
              value: https://myquizdeck.com
            # 세션·JWT 서명 키 — git 밖 Secret. 생성: k8s/base/README.md
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: BETTER_AUTH_SECRET
            # Better Auth Infra 대시보드(dash.better-auth.com) API 키 — git 밖 Secret.
            # 같은 quizdeck-auth Secret 에 보관. 생성·로테이트: k8s/base/README.md
            - name: BETTER_AUTH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: BETTER_AUTH_API_KEY
            # DB VM postgres 접속 — #4 가 만든 Secret(infra/db-vm/k8s/README.md)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            # 트랜잭션 이메일 발신주소 — 시크릿 아님(평문 env). (ADR-0004 / 이슈 #21)
            - name: EMAIL_FROM
              value: "QuizDeck <noreply@myquizdeck.com>"
            # Resend API 키 — git 밖 Secret. 같은 quizdeck-auth Secret 에 보관(생성: k8s/base/README.md)
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: RESEND_API_KEY
            # 소셜 로그인(V4 / 이슈 #9) OAuth 자격증명 — git 밖 quizdeck-auth Secret.
            # optional:true — 외부 앱 등록 전(키 부재)에도 파드가 정상 기동하고, 키가 채워진
            # provider 만 런타임에 enable 된다(lib/auth-config.ts 가 양쪽 다 있을 때만 켠다).
            # 콜백: GitHub·Google = /api/auth/callback/{github,google},
            #       Naver = /api/auth/oauth2/callback/naver (generic OAuth — 경로 다름).
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: NAVER_CLIENT_ID
                  optional: true
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: NAVER_CLIENT_SECRET
                  optional: true
            # WP 서빙(ADR-0025 3단계) — 클러스터 내부 Service 로 REST read(tailnet 왕복 회피).
            - name: WP_API_URL
              value: http://wordpress.wordpress.svc.cluster.local
            # WP 편집 웹훅 공유 토큰 — git 밖 quizdeck-auth Secret(k8s/base/README.md).
            - name: REVALIDATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: REVALIDATE_TOKEN
                  optional: true
          # readiness — 앱이 요청 수용 준비됐음(ADR-0018). DB 무관: 공유 외부 DB 로 트래픽을 게이팅하면
          # replicas:1 에서 DB 순단이 전면 503 이 되고 롤아웃을 wedge 한다. trailingSlash:true 라 슬래시 포함.
          # 롤아웃 2단계(2026-07-08): sha-7f786a5(=/api/ready 도입 이미지)가 라이브 확인돼 /api/health/
          # 에서 /api/ready/ 로 이동 — 도는 이미지에 경로가 존재하므로 안전(순서 불변식 충족).
          readinessProbe:
            httpGet:
              path: /api/ready/
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          # liveness — 프로세스 생존만 본다(true hang/deadlock 에만 재시작). DB 무관이라 DB 순단으로
          # 절대 재시작 안 됨(캐스케이드 방지). replicas:1 이라 flapping·불필요 재시작을 막게 관용
          # (period 20·failureThreshold 3 ≈ 60s hang 이어야 재시작). Docker HEALTHCHECK 도 /api/health/ 를 문다.
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              # 256→512Mi (ADR-0024): Payload embed(admin 번들+Drizzle)가 얹히는 여유분.
              memory: 512Mi
