apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizdeck
  labels:
    app: quizdeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quizdeck
  template:
    metadata:
      labels:
        app: quizdeck
    spec:
      containers:
        - name: quizdeck
          image: ghcr.io/young1ll/quizdeck # 태그는 kustomization.yaml(CI가 bump)에서 지정
          ports:
            - containerPort: 3000 # node standalone 서버(이미지가 PORT=3000)
          readinessProbe:
            # /api/health/ — Route Handler 토대 증명. trailingSlash:true 라 슬래시 포함이 곧장 200.
            httpGet:
              path: /api/health/
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
