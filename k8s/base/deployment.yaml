apiVersion: apps/v1
kind: Deployment
metadata:
  name: quizdeck
  labels:
    app: quizdeck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quizdeck
  template:
    metadata:
      labels:
        app: quizdeck
    spec:
      containers:
        - name: quizdeck
          image: ghcr.io/young1ll/quizdeck # 태그는 kustomization.yaml(CI가 bump)에서 지정
          ports:
            - containerPort: 3000 # node standalone 서버(이미지가 PORT=3000)
          env:
            # 절대 URL·trustedOrigins(CSRF) 기준. 공개 도메인이라 시크릿 아님. (이슈 #6)
            - name: BETTER_AUTH_URL
              value: https://myquizdeck.com
            # 세션·JWT 서명 키 — git 밖 Secret. 생성: k8s/base/README.md
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: BETTER_AUTH_SECRET
            # Better Auth Infra 대시보드(dash.better-auth.com) API 키 — git 밖 Secret.
            # 같은 quizdeck-auth Secret 에 보관. 생성·로테이트: k8s/base/README.md
            - name: BETTER_AUTH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: quizdeck-auth
                  key: BETTER_AUTH_API_KEY
            # DB VM postgres 접속 — #4 가 만든 Secret(infra/db-vm/k8s/README.md)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          readinessProbe:
            # /api/health/ — Route Handler 토대 증명. trailingSlash:true 라 슬래시 포함이 곧장 200.
            httpGet:
              path: /api/health/
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
