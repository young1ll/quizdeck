# ArgoCD UI 를 Tailscale 전용으로 노출하는 Traefik IngressRoute (ADR-0020).
#
# 경로: (tailnet) argocd.myquizdeck.com → grey-cloud DNS → VM Tailscale IP(100.81.230.113)
#        → Traefik(websecure) → 이 IngressRoute → argocd-server(:80, --insecure).
#
# 인터넷 격리는 이 매니페스트가 아니라 **Cloudflare 레코드가 grey-cloud(DNS-only)** 라는 사실이
# 보장한다(orange 로 뒤집으면 인터넷에 열림). k8s/argocd-server/scripts/verify-argo-exposure.sh 가
# 그 규율을 pass/fail 로 검증한다. bootstrap(certresolver·--insecure·DNS·토큰)은 README 참조.
#
# k3s v1.35 = Traefik v3 → apiVersion traefik.io/v1alpha1.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure # 443 — Traefik 이 아래 certResolver 로 TLS 종단
  routes:
    - kind: Rule
      # Host 기반 라우팅. priority 를 높여 Traefik 기본 catch-all(quizdeck)보다 먼저 매칭되게 한다
      # (회귀 없음 = verify 프로브 단언 3: myquizdeck.com 은 여전히 quizdeck).
      match: Host(`argocd.myquizdeck.com`)
      priority: 100
      services:
        - name: argocd-server
          # --insecure 면 argocd-server Service 의 http 포트(80→targetPort 8080)로 평문 HTTP.
          port: 80
  tls:
    # Traefik certificatesResolvers.cloudflare (DNS-01) — bootstrap 에서 HelmChartConfig 로 설정.
    # 발급 도메인은 위 Host 에서 파생된다.
    certResolver: cloudflare
