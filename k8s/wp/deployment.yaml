# headless WordPress (ADR-0025). 콘텐츠 저작 전용 — 학습자는 이 pod 를 직접 보지 않는다
# (admin 은 tailnet 전용 IngressRoute, 앱은 클러스터 내부 Service 로 REST read).
# 무상태 원칙: /var/www/html 은 emptyDir(기동 시 코어 복사) — 플러그인·코어는 이미지가 소유
# (DISALLOW_FILE_MODS), 업로드 미디어는 R2 offload(QuizDeck CMS media 모듈 — 공개 URL 은
# media.myquizdeck.com). DB 는 db-home MariaDB(git 밖 Secret).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wordpress
  labels: { app: wordpress }
spec:
  replicas: 1
  selector:
    matchLabels: { app: wordpress }
  template:
    metadata:
      labels: { app: wordpress }
    spec:
      containers:
        - name: wordpress
          image: ghcr.io/young1ll/quizdeck-wp # 태그는 kustomization(newTag — CI bump)
          ports:
            - containerPort: 80
          envFrom:
            # WORDPRESS_DB_HOST/NAME/USER/PASSWORD — infra/wp-db/provision-mariadb.sh 출력으로 생성
            - secretRef: { name: wp-db-credentials }
            # WORDPRESS_AUTH_KEY 등 salts 8종 — k8s/wp/README.md
            - secretRef: { name: wp-salts }
            # QD_MEDIA_* 5종(R2 offload — QuizDeck CMS media 모듈). optional: Secret 부재 시
            # 미디어만 로컬(비영속)로 남고 pod 는 정상 기동 — 부트스트랩 순서에 인질 안 잡힘.
            - secretRef: { name: wp-media, optional: true }
          env:
            # 편집 → 앱 revalidate 웹훅(3단계) — 클러스터 내부 앱 Service. 토큰은 git 밖
            # wp-revalidate Secret(앱 쪽 quizdeck-auth 의 REVALIDATE_TOKEN 과 같은 값 — README).
            - name: QD_REVALIDATE_URL
              value: http://quizdeck.quizdeck.svc.cluster.local/api/revalidate-content
            - name: QD_REVALIDATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wp-revalidate
                  key: QD_REVALIDATE_TOKEN
                  optional: true
            # wp-admin '회원 주석' 관리(ADR-0027) — 앱 admin API 서버-서버. 토큰은 git 밖
            # wp-admin-api Secret(앱 쪽 quizdeck-auth 의 ADMIN_API_TOKEN 과 같은 값 — README).
            # revalidate 와 토큰 분리 — 권한 등급(캐시 무효화 vs 회원 데이터 뮤테이션)이 다르다.
            - name: QD_ADMIN_API_URL
              value: http://quizdeck.quizdeck.svc.cluster.local/api/admin
            - name: QD_ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wp-admin-api
                  key: QD_ADMIN_API_TOKEN
                  optional: true
            # wp-admin SSO(ADR-0028) — 앱 계정 OIDC 로그인. secret 은 앱 DB oauthClient 행의
            # 해시와 쌍(생성·시드는 db/migrations/README.md 0012 절). 부재 시 SSO 만 no-op
            # (로컬 로그인 폴백 유지).
            - name: QD_SSO_CLIENT_ID
              value: wordpress-admin
            - name: QD_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wp-sso
                  key: QD_SSO_CLIENT_SECRET
                  optional: true
            # 환경값만 — 제품 행동(DISALLOW_FILE_MODS 등)은 플러그인 platform 모듈이 소유(흡수 2026-07-14)
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://wp.myquizdeck.com');
                define('WP_SITEURL', 'https://wp.myquizdeck.com');
                /* Traefik 이 TLS 종단(pod 는 HTTP) — 프록시 헤더로 HTTPS 인지 */
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') { $_SERVER['HTTPS'] = 'on'; }
          readinessProbe:
            httpGet: { path: /wp-login.php, port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /wp-login.php, port: 80 }
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            - { name: html, mountPath: /var/www/html }
      volumes:
        - name: html
          emptyDir: {}
