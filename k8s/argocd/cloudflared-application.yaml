apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/young1ll/quizdeck.git
    targetRevision: main
    path: k8s/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # cloudflared-token Secret 은 git 밖 → Argo 동기화 대상에서 제외(존재만 의존)
