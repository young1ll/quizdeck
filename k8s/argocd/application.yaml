apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quizdeck
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/young1ll/quizdeck.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: quizdeck
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
