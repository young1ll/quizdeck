# WP 이미지 빌드·배포 (ADR-0025). infra/wp/** 변경 시에만 — 앱 파이프라인(deploy.yml)과 분리.
# 패턴은 deploy.yml 계승: build→ghcr push→k8s/wp/kustomization newTag bump([skip ci])→Argo sync.
name: wp-image
on:
  push:
    branches: [main]
    paths: ["infra/wp/**"]
permissions:
  contents: write
  packages: write
jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: infra/wp
          push: true
          tags: ghcr.io/young1ll/quizdeck-wp:${{ steps.meta.outputs.tag }}
      - name: bump kustomization
        run: |
          sed -i "s|newTag:.*|newTag: ${{ steps.meta.outputs.tag }}|" k8s/wp/kustomization.yaml
          git config user.name github-actions && git config user.email actions@github.com
          git add k8s/wp/kustomization.yaml
          git commit -m "ci: wp image ${{ steps.meta.outputs.tag }} [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main
