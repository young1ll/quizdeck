name: build-and-deploy

# main 푸시 → 테스트 → 이미지 빌드(ghcr) → kustomize 태그 bump 커밋.
# Argo CD가 k8s/base 변경을 감지해 새 이미지를 배포한다(pull 기반 GitOps).
on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/base/kustomization.yaml" # CI의 태그 bump 커밋이 다시 트리거하지 않도록
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write # 태그 bump 커밋 push
  packages: write # ghcr push

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/young1ll/quizdeck:${{ steps.meta.outputs.tag }}
            ghcr.io/young1ll/quizdeck:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: 매니페스트 이미지 태그 bump → Argo가 배포. GITHUB_TOKEN push라 재트리거 없음.
      - name: Bump image tag
        run: |
          sed -i "s|newTag:.*|newTag: ${{ steps.meta.outputs.tag }}|" k8s/base/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/kustomization.yaml
          git commit -m "ci: deploy ${{ steps.meta.outputs.tag }} [skip ci]" || { echo "no change"; exit 0; }
          git push
