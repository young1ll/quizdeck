name: build-and-deploy

# main 푸시 → 테스트 → 이미지 빌드(ghcr) → kustomize 태그 bump 커밋.
# Argo CD가 k8s/base 변경을 감지해 새 이미지를 배포한다(pull 기반 GitOps).
on:
  push:
    branches: [main]
    paths-ignore:
      - "k8s/**" # 매니페스트 변경은 Argo가 처리 — 이미지 재빌드 불필요(CI 태그 bump 포함)
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write # 태그 bump 커밋 push
  packages: write # ghcr push

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 태그 bump 단계의 rebase/merge-base 에 전체 이력 필요

      - uses: pnpm/action-setup@v4 # 버전은 package.json 의 packageManager 에서 읽음
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/young1ll/quizdeck:${{ steps.meta.outputs.tag }}
            ghcr.io/young1ll/quizdeck:latest
          # 런타임이 자기 sha 를 알도록 주입 — /api/health·/api/status 가 노출(ADR-0018). .git 은
          # dockerignore 라 이미지 안에서 git 을 못 읽으므로 빌드 인자로 넣는다.
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: 매니페스트 이미지 태그 bump → Argo가 배포. GITHUB_TOKEN push라 재트리거 없음.
      #
      # 동시 머지(여러 PR 가 비슷한 시각에 main 에 올라옴) 안전성:
      #  1) 더 새로운 커밋이 이미 main 에 있으면(=내 빌드 커밋이 origin/main 의 조상) 이 빌드는
      #     추월된 것 → 배포 스킵. 더 최신 run 이 상위 이미지를 배포하므로 다운그레이드·중복 롤아웃 방지.
      #  2) push 가 동시성으로 거부(non-fast-forward)되면 최신 main 에 리베이스 후 재시도.
      #     newTag 같은 줄을 더 최신 배포가 이미 바꿔 충돌나면 = 그 배포가 우선이므로 깨끗이 스킵.
      - name: Bump image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ] \
             && git merge-base --is-ancestor HEAD origin/main; then
            echo "더 새로운 커밋이 main 에 반영됨 — 이 빌드는 추월되어 배포를 스킵한다."
            exit 0
          fi
          sed -i "s|newTag:.*|newTag: ${{ steps.meta.outputs.tag }}|" k8s/base/kustomization.yaml
          git add k8s/base/kustomization.yaml
          git diff --cached --quiet && { echo "변경 없음 — 스킵"; exit 0; }
          git commit -m "ci: deploy ${{ steps.meta.outputs.tag }} [skip ci]"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then echo "푸시 완료"; exit 0; fi
            echo "push 거부(시도 $attempt) — 최신 main 에 리베이스 후 재시도"
            git fetch origin main
            git rebase origin/main || { echo "리베이스 충돌 — 더 최신 배포가 우선, 스킵"; git rebase --abort; exit 0; }
          done
          echo "재시도 후에도 push 실패" >&2
          exit 1
